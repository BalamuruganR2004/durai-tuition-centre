version: "3.9"
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: durai_tuition
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  web:
    build: ..
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/durai_tuition
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - media:/app/media

  celery:
    build: ..
    command: celery -A durai_backend worker -l info -c 4
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/durai_tuition
      REDIS_URL: redis://redis:6379/0
    depends_on: [web, redis]

  celery_beat:
    build: ..
    command: celery -A durai_backend beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: ../.env
    depends_on: [web, redis]

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - media:/app/media:ro
    depends_on: [web]

volumes:
  postgres_data:
  redis_data:
  media:
