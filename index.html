<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Durai Tuition Centre</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0d1b3e;--navy2:#142250;--navy3:#1a2d6b;
  --blue:#1e6fff;--blue2:#4d8fff;--blue-light:#e8f0ff;
  --white:#ffffff;--bg:#f0f4ff;--bg2:#e4eafb;
  --text:#0d1b3e;--text2:#4a5568;--text3:#8492a6;
  --green:#00c48c;--green-bg:#e6faf5;
  --amber:#f59e0b;--amber-bg:#fff8e1;
  --red:#ef4444;--red-bg:#fff0f0;
  --purple:#7c3aed;--purple-bg:#f3f0ff;
  --border:#dde3f0;--border2:#c8d0e7;
  --r:12px;--r-sm:8px;--r-lg:18px;--r-xl:24px;
  --shadow:0 2px 12px rgba(13,27,62,.08);
  --shadow-lg:0 8px 32px rgba(13,27,62,.14);
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Inter',sans-serif;font-size:14px;color:var(--text);line-height:1.5}

/* ── LAYOUT ─────────────────────────────── */
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--white);position:relative;overflow:hidden;box-shadow:0 0 60px rgba(13,27,62,.15)}

/* ── LOGIN ──────────────────────────────── */
#login{display:flex;flex-direction:column;height:100%;background:var(--navy);position:relative;overflow:hidden}
.login-wave{position:absolute;bottom:0;left:0;right:0;height:55%;background:var(--white);border-radius:32px 32px 0 0}
.login-top{padding:48px 28px 0;position:relative;z-index:2}
.login-logo{width:56px;height:56px;background:var(--blue);border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.login-logo svg{width:28px;height:28px;fill:white}
.login-top h1{font-size:26px;font-weight:800;color:white;line-height:1.2;margin-bottom:6px}
.login-top p{font-size:14px;color:rgba(255,255,255,.6)}
.login-tags{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap}
.login-tag{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.85)}
.login-form-wrap{position:relative;z-index:2;padding:32px 24px 24px;background:var(--white);border-radius:32px 32px 0 0;margin-top:auto;flex-shrink:0}
.login-form-wrap h2{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:6px}
.login-form-wrap p{font-size:13px;color:var(--text2);margin-bottom:22px}
.role-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:20px}
.role-tab{padding:7px 4px;border-radius:7px;border:none;background:none;font-family:inherit;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:.15s;text-align:center}
.role-tab.active{background:var(--white);color:var(--blue);font-weight:600;box-shadow:var(--shadow)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.field input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;font-family:inherit;font-size:14px;color:var(--text);outline:none;transition:.15s}
.field input:focus{border-color:var(--blue);background:white;box-shadow:0 0 0 3px rgba(30,111,255,.1)}
.btn-signin{width:100%;background:var(--blue);color:white;border:none;border-radius:var(--r-sm);padding:14px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:.15s;margin-top:4px;letter-spacing:.2px}
.btn-signin:active{transform:scale(.98)}
.login-hint{text-align:center;font-size:12px;color:var(--text3);margin-top:12px}

/* ── TOPBAR ──────────────────────────────── */
#topbar{background:var(--navy);padding:14px 20px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:10}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-menu{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.1);border:none;color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.tb-menu svg{width:18px;height:18px;stroke:white;fill:none;stroke-width:2;stroke-linecap:round}
.tb-title{font-size:15px;font-weight:700;color:white}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-avatar{width:34px;height:34px;border-radius:50%;background:var(--blue);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;cursor:pointer;flex-shrink:0}
.tb-notif{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.1);border:none;color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.tb-notif svg{width:18px;height:18px;stroke:white;fill:none;stroke-width:2}
.notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:#ef4444;border-radius:50%;border:2px solid var(--navy)}

/* ── BOTTOM NAV ──────────────────────────── */
#bottom-nav{background:var(--white);border-top:1px solid var(--border);display:flex;padding:8px 4px 12px;flex-shrink:0;position:relative;z-index:10}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 4px;border-radius:10px;transition:.15s;border:none;background:none;font-family:inherit}
.bn-item svg{width:22px;height:22px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:.15s}
.bn-item span{font-size:10px;font-weight:500;color:var(--text3);transition:.15s}
.bn-item.active svg{stroke:var(--blue)}
.bn-item.active span{color:var(--blue);font-weight:700}
.bn-active-pill{position:absolute;top:0;height:3px;background:var(--blue);border-radius:0 0 3px 3px;transition:left .25s ease,width .25s ease}

/* ── SCROLLABLE PAGE ─────────────────────── */
#page{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--bg);position:relative}
#page::-webkit-scrollbar{display:none}

/* ── DRAWER (sidebar) ────────────────────── */
#drawer{position:absolute;top:0;bottom:0;left:0;width:82%;max-width:300px;background:var(--navy);z-index:50;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
#drawer.open{transform:translateX(0)}
#drawer-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:40;opacity:0;pointer-events:none;transition:opacity .28s}
#drawer-overlay.show{opacity:1;pointer-events:all}
.drawer-head{padding:28px 20px 20px;border-bottom:1px solid rgba(255,255,255,.1)}
.drawer-user{display:flex;align-items:center;gap:12px}
.drawer-av{width:46px;height:46px;border-radius:14px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:white;flex-shrink:0}
.drawer-name{font-size:15px;font-weight:700;color:white}
.drawer-role{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}
.drawer-nav{flex:1;overflow-y:auto;padding:12px 0}
.drawer-section{font-size:10px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.8px;padding:12px 20px 4px}
.drawer-item{display:flex;align-items:center;gap:12px;padding:11px 20px;cursor:pointer;transition:.15s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.drawer-item:hover{background:rgba(255,255,255,.06)}
.drawer-item.active{background:rgba(30,111,255,.2)}
.drawer-item svg{width:18px;height:18px;stroke:rgba(255,255,255,.5);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.drawer-item.active svg{stroke:var(--blue2)}
.drawer-item span{font-size:13px;font-weight:500;color:rgba(255,255,255,.6)}
.drawer-item.active span{color:white;font-weight:600}
.drawer-footer{padding:16px 20px 28px;border-top:1px solid rgba(255,255,255,.1)}
.drawer-logout{display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 0;border:none;background:none;font-family:inherit}
.drawer-logout svg{width:18px;height:18px;stroke:rgba(255,255,255,.4);fill:none;stroke-width:2;stroke-linecap:round}
.drawer-logout span{font-size:13px;color:rgba(255,255,255,.4);font-weight:500}

/* ── PAGE CONTENT ────────────────────────── */
.page-pad{padding:16px}

/* ── STATS STRIP ─────────────────────────── */
.stats-scroll{display:flex;gap:10px;overflow-x:auto;padding:16px 16px 4px;scrollbar-width:none}
.stats-scroll::-webkit-scrollbar{display:none}
.stat-chip{background:white;border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;flex-shrink:0;min-width:110px;box-shadow:var(--shadow)}
.stat-chip .sc-val{font-size:22px;font-weight:800;color:var(--navy);line-height:1}
.stat-chip .sc-lbl{font-size:11px;color:var(--text2);margin-top:4px;font-weight:500}
.stat-chip .sc-bar{height:3px;border-radius:2px;margin-top:8px;background:var(--border)}
.stat-chip .sc-fill{height:100%;border-radius:2px;transition:width 1s ease}

/* ── SECTION HEADER ─────────────────────── */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin:0 16px 10px}
.sec-head h3{font-size:14px;font-weight:700;color:var(--navy)}
.sec-head a{font-size:12px;color:var(--blue);font-weight:600;cursor:pointer;border:none;background:none;font-family:inherit}

/* ── CARDS ───────────────────────────────── */
.card{background:white;border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin:0 16px 10px;box-shadow:var(--shadow)}
.card-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-row h4{font-size:13px;font-weight:700;color:var(--navy)}

/* ── STUDENT ROW ─────────────────────────── */
.stu-row{display:flex;align-items:center;gap:12px;padding:10px 16px;background:white;border-bottom:1px solid var(--bg);cursor:pointer;transition:.15s;active:background:var(--bg)}
.stu-row:last-child{border-bottom:none}
.stu-av{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0}
.stu-info{flex:1;min-width:0}
.stu-name{font-size:13px;font-weight:600;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stu-sub{font-size:11px;color:var(--text2);margin-top:1px}
.stu-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}

/* ── BADGE ───────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.b-green{background:var(--green-bg);color:#059669}
.b-amber{background:var(--amber-bg);color:#b45309}
.b-red{background:var(--red-bg);color:#dc2626}
.b-blue{background:var(--blue-light);color:#1d4ed8}
.b-purple{background:var(--purple-bg);color:#6d28d9}
.b-navy{background:rgba(13,27,62,.08);color:var(--navy)}
.b-cbse{background:#e0edff;color:#1d4ed8}
.b-intl{background:#ede9fe;color:#6d28d9}
.b-state{background:#dcfce7;color:#059669}

/* ── BUTTON ──────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--r-sm);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--blue);color:white}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btn-success{background:var(--green-bg);color:#059669;border:1px solid rgba(0,196,140,.2)}
.btn-sm{padding:7px 13px;font-size:12px}
.btn-xs{padding:5px 10px;font-size:11px}
.btn-full{width:100%}

/* ── PROGRESS BAR ────────────────────────── */
.prog{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .8s ease}
.pf-blue{background:var(--blue)}.pf-green{background:var(--green)}.pf-amber{background:var(--amber)}.pf-red{background:var(--red)}

/* ── INPUT / SELECT ──────────────────────── */
.inp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px 14px;font-family:inherit;font-size:13px;color:var(--text);outline:none;transition:.15s}
.inp:focus{border-color:var(--blue);background:white;box-shadow:0 0 0 3px rgba(30,111,255,.08)}
.inp-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;display:block}
.field-grp{margin-bottom:14px}

/* ── ATT GRID ────────────────────────────── */
.att-card{background:white;border:1.5px solid var(--border);border-radius:var(--r);padding:12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;box-shadow:var(--shadow)}
.att-btns{display:flex;gap:5px}
.att-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:none;cursor:pointer;font-size:13px;font-weight:700;transition:.15s;display:flex;align-items:center;justify-content:center}
.att-btn.P{background:var(--green-bg);border-color:var(--green);color:#059669}
.att-btn.A{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.att-btn.L{background:var(--amber-bg);border-color:var(--amber);color:#b45309}

/* ── CLASS CARD ──────────────────────────── */
.cls-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px}
.cls-card{background:white;border:1.5px solid var(--border);border-radius:var(--r);padding:12px 10px;text-align:center;cursor:pointer;transition:.15s;box-shadow:var(--shadow)}
.cls-card:active{transform:scale(.97)}
.cls-card.cbse{border-top:3px solid var(--blue)}
.cls-card.intl{border-top:3px solid var(--purple)}
.cls-card.state{border-top:3px solid var(--green)}
.cls-num{font-size:18px;font-weight:800;color:var(--navy)}
.cls-lbl{font-size:10px;font-weight:500;color:var(--text2);margin-top:2px}
.cls-cnt{font-size:10px;color:var(--text3);margin-top:5px}

/* ── SYLLABUS FILTER ─────────────────────── */
.syl-bar{display:flex;gap:6px;overflow-x:auto;padding:0 16px 0;scrollbar-width:none;margin-bottom:12px}
.syl-bar::-webkit-scrollbar{display:none}
.syl-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:white;font-family:inherit;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;transition:.15s;flex-shrink:0}
.syl-btn.active-all{border-color:var(--blue);background:var(--blue-light);color:#1d4ed8}
.syl-btn.active-cbse{border-color:var(--blue);background:#e0edff;color:#1d4ed8}
.syl-btn.active-intl{border-color:var(--purple);background:#ede9fe;color:#6d28d9}
.syl-btn.active-state{border-color:var(--green);background:#dcfce7;color:#059669}

/* ── TIMELINE ────────────────────────────── */
.timeline{padding:0 16px}
.tl-item{display:flex;gap:12px;padding-bottom:16px;position:relative}
.tl-item::before{content:'';position:absolute;left:15px;top:28px;bottom:0;width:1px;background:var(--border)}
.tl-item:last-child::before{display:none}
.tl-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.tl-body{flex:1;padding-top:4px}
.tl-title{font-size:13px;font-weight:600;color:var(--navy)}
.tl-desc{font-size:12px;color:var(--text2);margin-top:2px}
.tl-time{font-size:11px;color:var(--text3);margin-top:3px}

/* ── WA LOG ──────────────────────────────── */
.wa-item{background:white;border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;border-left:3px solid var(--green)}
.wa-to{font-size:12px;font-weight:600;color:var(--green);margin-bottom:4px}
.wa-msg{font-size:12px;color:var(--text);line-height:1.4}
.wa-foot{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.wa-time{font-size:11px;color:var(--text3)}
.wa-stat{font-size:11px;font-weight:600;color:var(--green)}

/* ── RESULT CARD ─────────────────────────── */
.result-card{background:white;border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center;box-shadow:var(--shadow)}
.result-score{font-size:34px;font-weight:800;line-height:1}
.result-grade{font-size:14px;font-weight:700;margin-top:4px}
.result-info{font-size:11px;color:var(--text2);margin-top:4px}

/* ── FEE CARD ────────────────────────────── */
.fee-row{background:white;border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow)}
.fee-row .fr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.fee-row .fr-name{font-size:13px;font-weight:700;color:var(--navy)}
.fee-row .fr-amt{font-size:18px;font-weight:800;color:var(--navy)}
.fee-row .fr-sub{font-size:11px;color:var(--text2);margin-top:2px}

/* ── TABS ────────────────────────────────── */
.tabs{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin:0 16px 14px;gap:3px}
.tab{flex:1;padding:8px 4px;border-radius:7px;border:none;background:none;font-family:inherit;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:.15s;text-align:center}
.tab.active{background:white;color:var(--blue);font-weight:700;box-shadow:var(--shadow)}

/* ── MARKS INPUT ─────────────────────────── */
.marks-in{width:56px;background:var(--bg);border:1.5px solid var(--border);border-radius:6px;padding:6px 8px;font-family:inherit;font-size:12px;text-align:center;color:var(--text);outline:none}
.marks-in:focus{border-color:var(--blue);background:white}

/* ── MODAL (bottom sheet) ────────────────── */
.sheet-bg{position:absolute;inset:0;background:rgba(13,27,62,.55);z-index:60;opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:flex-end}
.sheet-bg.show{opacity:1;pointer-events:all}
.sheet{background:white;border-radius:20px 20px 0 0;padding:20px 20px 32px;width:100%;max-height:85%;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.sheet-bg.show .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.sheet-title{font-size:17px;font-weight:800;color:var(--navy);margin-bottom:16px}
.sheet-close{float:right;background:var(--bg);border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;color:var(--text2);margin-top:-4px}

/* ── TOAST ───────────────────────────────── */
.toast{position:absolute;bottom:80px;left:16px;right:16px;background:var(--navy);color:white;padding:12px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:500;z-index:99;animation:slideup .3s ease;box-shadow:var(--shadow-lg)}
@keyframes slideup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── AI CHAT ─────────────────────────────── */
.ai-msg{max-width:88%;padding:10px 13px;border-radius:14px;font-size:13px;line-height:1.5;margin-bottom:8px}
.ai-user{background:var(--blue);color:white;align-self:flex-end;border-radius:14px 14px 2px 14px;margin-left:auto}
.ai-bot{background:white;color:var(--navy);align-self:flex-start;border-radius:14px 14px 14px 2px;border:1px solid var(--border)}
.ai-wrap{display:flex;flex-direction:column;padding:12px 16px;gap:0}

/* ── SEARCH ──────────────────────────────── */
.search-bar{display:flex;align-items:center;background:white;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:0 12px;margin:0 16px 12px;gap:8px}
.search-bar svg{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;flex-shrink:0}
.search-bar input{flex:1;border:none;background:none;padding:10px 0;font-family:inherit;font-size:13px;color:var(--text);outline:none}

/* ── DONUT ───────────────────────────────── */
.donut-wrap{display:flex;align-items:center;gap:16px}
.leg-row{display:flex;align-items:center;gap:7px;font-size:12px;margin-bottom:6px}
.leg-dot{width:9px;height:9px;border-radius:50%}

/* ── UPLOAD ZONE ─────────────────────────── */
.upload-z{border:2px dashed var(--border2);border-radius:var(--r);padding:28px 16px;text-align:center;background:var(--bg);cursor:pointer;transition:.15s;margin:0 16px 12px}
.upload-z:active{border-color:var(--blue);background:var(--blue-light)}

/* ── TIMETABLE ───────────────────────────── */
.ttbl{width:100%;border-collapse:collapse;font-size:11px}
.ttbl th{background:var(--navy);color:rgba(255,255,255,.8);padding:8px 6px;text-align:center;font-size:10px;text-transform:uppercase;letter-spacing:.3px}
.ttbl td{border:1px solid var(--border);padding:4px;text-align:center;vertical-align:middle}
.tt-cell{border-radius:5px;padding:4px 3px;font-size:10px;font-weight:600}
.tt-cell.cbse{background:#e0edff;color:#1d4ed8}
.tt-cell.intl{background:#ede9fe;color:#6d28d9}
.tt-cell.state{background:#dcfce7;color:#059669}
.tt-teach{font-size:9px;font-weight:400;margin-top:1px;opacity:.8}

/* ── SUMMARY CARDS 3-col ─────────────────── */
.syl-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px;margin-bottom:14px}
.syl-chip{border-radius:var(--r);padding:12px 10px;text-align:center;border:1.5px solid}
.syl-chip.cbse{background:#e0edff;border-color:#93c5fd}
.syl-chip.intl{background:#ede9fe;border-color:#c4b5fd}
.syl-chip.state{background:#dcfce7;border-color:#86efac}
.syl-chip .sv{font-size:20px;font-weight:800}
.syl-chip.cbse .sv{color:#1d4ed8}
.syl-chip.intl .sv{color:#6d28d9}
.syl-chip.state .sv{color:#059669}
.syl-chip .sl{font-size:10px;font-weight:500;margin-top:2px}
.syl-chip.cbse .sl{color:#3b82f6}
.syl-chip.intl .sl{color:#7c3aed}
.syl-chip.state .sl{color:#059669}

/* ── BAR CHART ───────────────────────────── */
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-lbl{font-size:11px;color:var(--text2);width:80px;text-align:right;flex-shrink:0;font-weight:500}
.bar-track{flex:1;height:18px;background:var(--bg2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:7px;font-size:10px;font-weight:700;color:white;transition:width .9s ease}
.bf-blue{background:var(--blue)}.bf-green{background:var(--green)}.bf-amber{background:var(--amber)}.bf-red{background:var(--red)}.bf-purple{background:var(--purple)}
.bar-val{width:32px;font-size:11px;font-weight:600;text-align:right;color:var(--text2)}

/* ── TABLE ───────────────────────────────── */
.tbl-wrap{overflow-x:auto;margin:0 16px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg);padding:9px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(--bg);color:var(--text)}
tr:last-child td{border-bottom:none}

.hidden{display:none!important}
</style>

function getCls(id){return CLASSES.find(c=>c.id===id)||{grade:'?',syllabus:'cbse'};}

function pcolor(p){return p>=75?'var(--green)':p>=50?'var(--amber)':'var(--red)';}
function avColor(i){return AVS[i%AVS.length];}
function initials(name){return name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();}
function feeBadge(s){const m={paid:'b-green',pending:'b-amber',overdue:'b-red',partial:'b-amber'};return`<span class="badge ${m[s]||'b-navy'}">${s}</span>`;}

function toast(msg){
  const old=document.getElementById('_toast');if(old)old.remove();
  const el=document.createElement('div');el.id='_toast';el.className='toast';el.textContent=msg;
  document.getElementById('app').appendChild(el);
  setTimeout(()=>el.remove(),3200);
}

function openSheet(title,html){
  document.getElementById('sheet-title').textContent=title;
  document.getElementById('sheet-body').innerHTML=html;
  document.getElementById('sheet-bg').classList.add('show');
}
function closeSheet(e){
  if(!e||e.target===document.getElementById('sheet-bg'))

}

let _sf='all', _ss='';
function stuFilt(f,btn){
  _sf=f;
  document.querySelectorAll('.syl-bar .syl-btn').forEach(b=>{b.className='syl-btn';});

  let r=D.students;

}

        <div style="text-align:right">
          <div class="fr-amt">₹${f.paid.toLocaleString()}</div>
          <div style="font-size:11px;color:var(--text3)">of ₹${f.amount.toLocaleString()}</div>
        </div>
      </div>
      <div class="prog" style="margin-top:8px">
        <div class="prog-fill ${f.status==='paid'?'pf-green':f.status==='overdue'?'pf-red':'pf-amber'}" style="width:${Math.round(f.paid/f.amount*100)}%"></div>
      </div>
      ${f.status!=='paid'?`<div style="margin-top:10px;font-size:12px;color:var(--red);font-weight:600">⚠️ ₹${(f.amount-f.paid).toLocaleString()} pending — Please pay by ${f.due}</div>`:''}
    </div>
  `).join(''):`<div class="card" style="margin:0 16px 8px;text-align:center;padding:16px;color:var(--green);font-size:13px;font-weight:600">✅ All fees paid</div>`}

  <!-- STUDY MATERIALS -->
  <div class="sec-head" style="margin-top:6px"><h3>Study materials for me</h3><button class="btn btn-xs btn-secondary" onclick="navTo('notes')">All notes</button></div>
  ${D.notes.filter(n=>n.syl===s.syl).slice(0,2).map(n=>`
    <div class="card" style="margin:0 16px 8px">
      <div style="display:flex;gap:10px;align-items:center">
        <div style="width:38px;height:38px;border-radius:10px;background:${s.syl==='cbse'?'#e0edff':s.syl==='intl'?'#ede9fe':'#dcfce7'};display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">📄</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${n.title}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px">${n.sub} &nbsp;•&nbsp; ${n.size}</div>
        </div>
        <button class="btn btn-primary btn-xs" onclick="toast('⬇ Downloading...')">Download</button>
      </div>
    </div>
  `).join('')}

  <!-- TIMETABLE TEASER -->
  <div class="sec-head" style="margin-top:6px"><h3>Today's classes</h3><button class="btn btn-xs btn-secondary" onclick="navTo('timetable')">Full timetable</button></div>
  <div class="card" style="margin:0 16px 16px">
    ${['Mathematics','Physics','English','Chemistry'].map((sub,i)=>{
      const times=['9:00–10:00','10:00–11:00','11:00–12:00','1:00–2:00'];
      const teachers={Mathematics:'Mrs. Lalitha',Physics:'Mr. Senthil',Chemistry:'Mrs. Kavya',English:'Mrs. Anitha'};
      const colors={Mathematics:'var(--blue)',Physics:'var(--purple)',Chemistry:'var(--green)',English:'var(--amber)'};
      return`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:${i<3?'1px solid var(--bg)':'none'}">
        <div style="width:4px;height:36px;border-radius:2px;background:${colors[sub]};flex-shrink:0"></div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:var(--navy)">${sub}</div>
          <div style="font-size:11px;color:var(--text2)">${teachers[sub]} &nbsp;•&nbsp; ${times[i]}</div>
        </div>
      </div>`;
    }).join('')}
  </div>
  `);
}

// ══════════════════════════════════════════════════════
// PARENT CHILD PROFILE PAGE (used when parent logs in)
// ══════════════════════════════════════════════════════
function rParentChildProfile(s){
  if(!s){ pg('<div class="page-pad"><p style="color:var(--text2)">Child not found</p></div>'); return; }
  const c=getCls(s.cid);
  const m=D.marks[s.id]||{};
  const myFees=D.fees.filter(f=>f.sid===s.id);
  const attDays=22, presentDays=Math.round(s.att*attDays/100);

  pg(`
  <!-- PARENT HERO -->
  <div style="background:linear-gradient(135deg,var(--navy),var(--navy3));padding:24px 16px 28px">
    <div style="font-size:11px;color:rgba(255,255,255,.6);margin-bottom:12px">Monitoring your child</div>
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:62px;height:62px;border-radius:18px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:white;flex-shrink:0">${initials(s.name)}</div>
      <div>
        <div style="font-size:20px;font-weight:800;color:white">${s.name}</div>
        <div style="font-size:13px;color:rgba(255,255,255,.7);margin-top:4px">${c.name} &nbsp;•&nbsp; ${SYL[s.syl].curriculum}</div>
        <div style="display:flex;gap:6px;margin-top:8px">${sylBadge(s.syl)}<span class="badge" style="background:rgba(255,255,255,.15);color:white">ID: ${s.id}</span></div>
      </div>
    </div>
  </div>

  <!-- OVERALL STATUS BANNER -->
  <div style="margin:14px 16px;padding:14px 16px;border-radius:var(--r);background:${s.att>=75&&s.avg>=50?'var(--green-bg)':'var(--red-bg)'};border:1px solid ${s.att>=75&&s.avg>=50?'rgba(0,196,140,.25)':'rgba(239,68,68,.25)'}">
    <div style="font-size:14px;font-weight:700;color:${s.att>=75&&s.avg>=50?'var(--green)':'var(--red)'}">
      ${s.att>=75&&s.avg>=50?'✅ All good — Your child is doing well!':'⚠️ Attention needed — Please review below'}
    </div>
    <div style="font-size:12px;color:var(--text2);margin-top:4px">Attendance ${s.att}% &nbsp;•&nbsp; Avg Marks ${s.avg}% &nbsp;•&nbsp; Fees ${s.fees}</div>
  </div>

  <!-- QUICK STATS -->
  <div class="stats-scroll">
    <div class="stat-chip">
      <div class="sc-val" style="color:${s.att>=75?'var(--green)':'var(--red)'}">${s.att}%</div>
      <div class="sc-lbl">Attendance</div>
      <div class="sc-bar"><div class="sc-fill" style="width:${s.att}%;background:${s.att>=75?'var(--green)':'var(--red)'}"></div></div>
    </div>
    <div class="stat-chip">
      <div class="sc-val" style="color:var(--blue)">${s.avg}%</div>
      <div class="sc-lbl">Avg Marks</div>
      <div class="sc-bar"><div class="sc-fill pf-blue" style="width:${s.avg}%"></div></div>
    </div>
    <div class="stat-chip">
      <div class="sc-val" style="color:${s.fees==='paid'?'var(--green)':'var(--red)'}">${s.fees==='paid'?'Paid ✓':'Pending'}</div>
      <div class="sc-lbl">Fee Status</div>
    </div>
    <div class="stat-chip">
      <div class="sc-val">${presentDays}/${attDays}</div>
      <div class="sc-lbl">Days Present</div>
    </div>
  </div>

  <!-- ATTENDANCE DETAIL -->
  <div class="sec-head"><h3>Attendance</h3></div>
  <div class="card" style="margin:0 16px 14px">
    <div style="display:flex;justify-content:space-around;margin-bottom:14px">
      <div style="text-align:center">
        <div style="font-size:26px;font-weight:800;color:${s.att>=75?'var(--green)':'var(--red)'}">${s.att}%</div>
        <div style="font-size:11px;color:var(--text2)">Overall</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:26px;font-weight:800;color:var(--green)">${presentDays}</div>
        <div style="font-size:11px;color:var(--text2)">Present</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:26px;font-weight:800;color:var(--red)">${attDays-presentDays}</div>
        <div style="font-size:11px;color:var(--text2)">Absent</div>
      </div>
    </div>
    <div class="prog" style="height:10px;margin-bottom:8px">
      <div class="prog-fill ${s.att>=75?'pf-green':'pf-red'}" style="width:${s.att}%"></div>
    </div>
    ${s.att<75
      ?`<div style="padding:10px 12px;background:var(--red-bg);border-radius:var(--r-sm);font-size:12px;color:var(--red);font-weight:600">⚠️ Below 75% — Please contact the centre immediately</div>`
      :s.att<85
      ?`<div style="padding:10px 12px;background:var(--amber-bg);border-radius:var(--r-sm);font-size:12px;color:#b45309;font-weight:600">📊 Attendance is average — Encourage regular attendance</div>`
      :`<div style="padding:10px 12px;background:var(--green-bg);border-radius:var(--r-sm);font-size:12px;color:#059669;font-weight:600">✅ Excellent attendance — Keep it up!</div>`
    }
  </div>

  <!-- EXAM RESULTS -->
  <div class="sec-head"><h3>Exam results</h3></div>
  ${Object.keys(m).length
    ? Object.entries(m).map(([ex,mk])=>{
        const max=ex==='Quarterly'||ex==='Half Yearly'?100:ex==='Term Assess'?50:25;
        const p=Math.round(mk/max*100);
        const g=p>=90?'A+':p>=80?'A':p>=70?'B+':p>=60?'B':p>=50?'C':'F';
        return`<div class="card" style="margin:0 16px 8px">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="width:50px;height:50px;border-radius:13px;background:${p>=75?'var(--green-bg)':p>=50?'var(--amber-bg)':'var(--red-bg)'};display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
              <div style="font-size:16px;font-weight:800;color:${p>=75?'var(--green)':p>=50?'var(--amber)':'var(--red)'}">${g}</div>
              <div style="font-size:9px;color:var(--text2)">${p}%</div>
            </div>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:700;color:var(--navy)">${ex}</div>
              <div style="font-size:12px;color:var(--text2);margin-top:1px">${mk} out of ${max} marks</div>
              <div class="prog" style="margin-top:6px">
                <div class="prog-fill ${p>=75?'pf-green':p>=50?'pf-amber':'pf-red'}" style="width:${p}%"></div>
              </div>
            </div>
          </div>
        </div>`;
      }).join('')
    : `<div class="card" style="margin:0 16px 8px;text-align:center;padding:20px;color:var(--text2);font-size:13px">No results published yet</div>`
  }

  <!-- FEES -->
  <div class="sec-head" style="margin-top:6px"><h3>Fee status</h3></div>
  ${myFees.length?myFees.map(f=>`
    <div class="fee-row" style="margin:0 16px 8px">
      <div class="fr-top">
        <div>
          <div class="fr-name">${f.month}</div>
          <div class="fr-sub">${SYL[f.syl].label} &nbsp;•&nbsp; Due: ${f.due}</div>
          <div style="margin-top:6px">${feeBadge(f.status)}</div>
        </div>
        <div style="text-align:right">
          <div class="fr-amt" style="color:${f.status==='paid'?'var(--green)':f.status==='overdue'?'var(--red)':'var(--amber)'}">₹${f.paid.toLocaleString()}</div>
          <div style="font-size:11px;color:var(--text3)">of ₹${f.amount.toLocaleString()}</div>
        </div>
      </div>
      <div class="prog" style="margin-top:8px">
        <div class="prog-fill ${f.status==='paid'?'pf-green':f.status==='overdue'?'pf-red':'pf-amber'}" style="width:${Math.round(f.paid/f.amount*100)}%"></div>
      </div>
      ${f.status!=='paid'?`<div style="margin-top:10px;display:flex;gap:8px"><button class="btn btn-primary btn-sm" style="flex:1" onclick="toast('📱 Payment reminder sent!')">Send Reminder</button><button class="btn btn-secondary btn-sm" onclick="toast('🧾 Receipt downloaded!')">Receipt</button></div>`:''}
    </div>
  `).join(''):`<div class="card" style="margin:0 16px 8px;text-align:center;padding:16px;color:var(--green);font-size:13px;font-weight:600">✅ All fees cleared</div>`}

  <!-- RECENT WHATSAPP ALERTS -->
  <div class="sec-head" style="margin-top:6px"><h3>Recent alerts from centre</h3></div>
  ${D.waLogs.slice(0,3).map(w=>`
    <div class="wa-item" style="margin:0 16px 8px">
      <div class="wa-to">📱 Durai Tuition Centre</div>
      <div class="wa-msg">${w.msg}</div>
      <div class="wa-foot"><span class="wa-time">${w.time}</span><span class="wa-stat">✓✓ ${w.status}</span></div>
    </div>
  `).join('')}

  <!-- CONTACT CENTRE -->
  <div style="padding:16px 16px 28px">
    <div style="background:var(--bg);border-radius:var(--r);padding:16px;text-align:center;margin-bottom:12px">
      <div style="font-size:13px;font-weight:600;color:var(--navy);margin-bottom:4px">Need help?</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:12px">Contact Durai Tuition Centre directly</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" style="flex:1" onclick="toast('📞 Calling +91 9876543200...')">📞 Call Centre</button>
        <button class="btn btn-secondary" style="flex:1" onclick="toast('💬 Opening WhatsApp...')">💬 WhatsApp</button>
      </div>
    </div>
  </div>
  `);
}

</script>
</body>
</html>
